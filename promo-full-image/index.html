<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promo Full Image</title>
  <link rel="stylesheet" href="css/promo-full-image.css">
</head>
<body>
  <main>
    <section class="promo-full-image" aria-labelledby="promo-full-image-title">
      <div class="promo-full-image__inner">
        <header class="promo-full-image__header">
          <h1 class="promo-full-image__heading" id="promo-full-image-title">Promo Full Image Headline</h1>
          <p class="promo-full-image__subtitle">Promo Full Image Subheadline</p>
        </header>

        <div class="promo-full-image__items">
          <article class="promo-image-card">
            <img class="promo-image-card__image" src="images/promo-full-image1.jpg" width="600" height="400" alt="Alt text">
            <div class="promo-image-card__overlay" aria-hidden="true"></div>
            <div class="promo-image-card__content">
              <a class="promo-image-card__link" href="#">Full Image CTA</a>
              <h2 class="promo-image-card__title">Full Image Title 1</h2>
            </div>
          </article>

          <article class="promo-image-card">
            <img class="promo-image-card__image" src="images/promo-full-image2.jpg" width="600" height="400" alt="Alt text">
            <div class="promo-image-card__overlay" aria-hidden="true"></div>
            <div class="promo-image-card__content">
              <a class="promo-image-card__link" href="#">Full Image CTA</a>
              <h2 class="promo-image-card__title">Full Image Title 2</h2>
            </div>
          </article>

          <article class="promo-image-card">
            <img class="promo-image-card__image" src="images/promo-full-image3.jpg" width="600" height="400" alt="Alt text">
            <div class="promo-image-card__overlay" aria-hidden="true"></div>
            <div class="promo-image-card__content">
              <a class="promo-image-card__link" href="#">Full Image CTA</a>
              <h2 class="promo-image-card__title">Full Image Title 3</h2>
            </div>
          </article>

          <article class="promo-image-card">
            <img class="promo-image-card__image" src="images/promo-full-image4.jpg" width="600" height="400" alt="Alt text">
            <div class="promo-image-card__overlay" aria-hidden="true"></div>
            <div class="promo-image-card__content">
              <a class="promo-image-card__link" href="#">Full Image CTA</a>
              <h2 class="promo-image-card__title">Full Image Title 4</h2>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
